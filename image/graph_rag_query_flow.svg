<svg width="1120" height="680" viewBox="0 0 1120 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">여러 청크를 함께 연결해야 답할 수 있는 질문</title>
  <desc id="desc">회의실 A 예약 질문에 답하려면 담당 부서가 있는 청크, 예약 절차가 있는 청크, 준비물이 있는 청크를 함께 연결해야 함을 보여준다.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <style>
      .title { font: 700 28px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #111827; }
      .subtitle { font: 500 15px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #475569; }
      .section { font: 700 18px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #0f172a; }
      .chunk-title { font: 700 18px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #0f172a; }
      .body { font: 500 14px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #334155; }
      .small { font: 500 12px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #64748b; }
      .em { font: 700 14px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #166534; }
      .answer { font: 700 18px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #991b1b; }
      .muted { font: 500 13px "Pretendard","Noto Sans KR",Arial,sans-serif; fill: #64748b; }
      .edge { stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
      .needed { stroke: #16a34a; stroke-width: 3.4; marker-end: url(#greenArrow); }
      .chip { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.2; }
      .warn { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1120" height="680" rx="30" fill="#f8fafc"/>
  <rect x="34" y="32" width="1052" height="616" rx="26" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="70" y="78" class="title">한 문단만 찾으면 답이 부족한 질문</text>
  <text x="70" y="108" class="subtitle">질문 하나에 답하려면 서로 떨어진 청크의 정보를 함께 연결해야 할 수 있습니다.</text>

  <!-- Question -->
  <g filter="url(#shadow)">
    <rect x="70" y="132" width="980" height="86" rx="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="98" y="166" class="section">질문</text>
    <text x="98" y="195" class="body">회의실 A를 예약하려면 어디에 연락하고 무엇을 준비해야 하나요?</text>
    <rect x="780" y="151" width="235" height="42" rx="16" class="warn"/>
    <text x="805" y="177" class="muted">한 청크만 보면 답이 반쪽입니다.</text>
  </g>

  <!-- Chunks -->
  <g filter="url(#shadow)">
    <rect x="70" y="260" width="300" height="210" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <text x="98" y="298" class="chunk-title">청크 1</text>
    <text x="98" y="326" class="body">회의실 A는 총무팀에서</text>
    <text x="98" y="350" class="body">예약과 기본 비품 관리를</text>
    <text x="98" y="374" class="body">맡고 있습니다.</text>
    <rect x="98" y="404" width="214" height="34" rx="17" class="chip"/>
    <text x="121" y="426" class="em">연락할 곳: 총무팀</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="260" width="300" height="210" rx="20" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="438" y="298" class="chunk-title">청크 2</text>
    <text x="438" y="326" class="body">회의실 사용 안내서에는</text>
    <text x="438" y="350" class="body">예약 절차와 장비 반납 절차가</text>
    <text x="438" y="374" class="body">포함되어 있습니다.</text>
    <rect x="438" y="404" width="214" height="34" rx="17" class="chip"/>
    <text x="463" y="426" class="em">예약 절차로 연결</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="750" y="260" width="300" height="210" rx="20" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="778" y="298" class="chunk-title">청크 3</text>
    <text x="778" y="326" class="body">예약 절차를 진행할 때는</text>
    <text x="778" y="350" class="body">사원증이 필요합니다.</text>
    <text x="778" y="374" class="small">청크 2에서 찾은 절차와</text>
    <text x="778" y="396" class="small">함께 봐야 회의실 A 질문에 연결됩니다.</text>
    <rect x="778" y="419" width="174" height="34" rx="17" class="chip"/>
    <text x="806" y="441" class="em">준비물: 사원증</text>
  </g>

  <!-- Need all chunks -->
  <path d="M220 470 L220 523" class="needed"/>
  <path d="M560 470 L560 523" class="needed"/>
  <path d="M900 470 L900 523" class="needed"/>

  <g filter="url(#shadow)">
    <rect x="70" y="525" width="980" height="92" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="98" y="560" class="section">연결해서 해석하기</text>
    <text x="98" y="589" class="body">청크 1에서 연락할 곳을 찾고, 청크 2에서 회의실 A 질문을 예약 절차로 연결한 뒤, 청크 3에서 준비물을 확인합니다.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="230" y="630" width="660" height="36" rx="18" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="560" y="654" text-anchor="middle" class="answer">답변: 총무팀에 연락하고, 사원증을 준비합니다.</text>
  </g>

  <path d="M560 617 L560 630" class="edge"/>
</svg>
