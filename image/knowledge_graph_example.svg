<svg width="1100" height="650" viewBox="0 0 1100 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill: #111827; }
      .subtitle { font: 500 16px sans-serif; fill: #475569; }
      .node-title { font: 700 19px sans-serif; fill: #0f172a; }
      .node-type { font: 600 13px sans-serif; fill: #475569; }
      .edge { stroke: #475569; stroke-width: 2.6; marker-end: url(#arrow); }
      .edge-label-bg { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .edge-label { font: 700 14px sans-serif; fill: #334155; }
      .legend-title { font: 700 14px sans-serif; fill: #111827; }
      .legend-text { font: 500 13px sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="650" rx="30" fill="#f8fafc"/>
  <rect x="32" y="32" width="1036" height="586" rx="26" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="68" y="82" class="title">지식그래프 예시</text>
  <text x="68" y="114" class="subtitle">대상은 노드가 되고, 관계는 방향이 있는 연결선이 됩니다.</text>

  <!-- Edges: top row -->
  <line x1="340" y1="184" x2="460" y2="184" class="edge"/>
  <line x1="660" y1="184" x2="820" y2="184" class="edge"/>

  <!-- Edges: bottom row -->
  <path d="M 260 428 C 326 370, 382 366, 460 374" class="edge"/>
  <path d="M 260 450 C 420 560, 650 560, 820 486" class="edge"/>

  <!-- Edge labels -->
  <rect x="350" y="143" width="98" height="32" rx="16" class="edge-label-bg"/>
  <text x="371" y="165" class="edge-label">포함한다</text>

  <rect x="684" y="143" width="110" height="32" rx="16" class="edge-label-bg"/>
  <text x="705" y="165" class="edge-label">필요로한다</text>

  <rect x="314" y="330" width="120" height="32" rx="16" class="edge-label-bg"/>
  <text x="340" y="352" class="edge-label">갖추고있다</text>

  <rect x="458" y="520" width="132" height="32" rx="16" class="edge-label-bg"/>
  <text x="479" y="542" class="edge-label">담당부서이다</text>

  <!-- Nodes: top row -->
  <g filter="url(#shadow)">
    <rect x="60" y="139" width="280" height="90" rx="22" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
    <text x="114" y="176" class="node-title">회의실 사용 안내서</text>
    <text x="150" y="204" class="node-type">대상 유형: 문서</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="139" width="200" height="90" rx="22" fill="#cffafe" stroke="#67e8f9" stroke-width="2"/>
    <text x="518" y="176" class="node-title">예약 절차</text>
    <text x="510" y="204" class="node-type">대상 유형: 절차</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="139" width="170" height="90" rx="22" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
    <text x="873" y="176" class="node-title">사원증</text>
    <text x="858" y="204" class="node-type">대상 유형: 물건</text>
  </g>

  <!-- Nodes: bottom row -->
  <g filter="url(#shadow)">
    <rect x="60" y="383" width="200" height="90" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="107" y="420" class="node-title">회의실 A</text>
    <text x="110" y="448" class="node-type">대상 유형: 공간</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="329" width="200" height="90" rx="22" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="510" y="366" class="node-title">빔프로젝터</text>
    <text x="510" y="394" class="node-type">대상 유형: 비품</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="441" width="180" height="90" rx="22" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
    <text x="878" y="478" class="node-title">총무팀</text>
    <text x="860" y="506" class="node-type">대상 유형: 부서</text>
  </g>

  <rect x="68" y="580" width="964" height="38" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="94" y="604" class="legend-title">읽는 방법</text>
  <text x="182" y="604" class="legend-text">회의실 A - 갖추고있다 - 빔프로젝터</text>
  <text x="512" y="604" class="legend-text">회의실 사용 안내서 - 포함한다 - 예약 절차</text>
</svg>
